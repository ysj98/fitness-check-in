services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: fitness_check_in
      MYSQL_USER: fitness
      MYSQL_PASSWORD: fitness_password
      MYSQL_ROOT_PASSWORD: root_password
      TZ: Asia/Shanghai
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [CMD, mysqladmin, ping, -h, localhost]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://fitness:fitness_password@mysql:3306/fitness_check_in
      JWT_SECRET: change-this-long-random-secret
      WECHAT_APPID: ${WECHAT_APPID:-}
      WECHAT_SECRET: ${WECHAT_SECRET:-}
      PORT: 3000
      HOST: 0.0.0.0
      TZ: Asia/Shanghai
    ports:
      - '3000:3000'
    volumes:
      - uploads_data:/app/uploads

volumes:
  mysql_data:
  uploads_data:
